<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORVAN ARCADE // NEXUS</title>
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #6366f1;
            --neon-cyan: #06b6d4;
            --bg-base: #06020b;
            --panel-bg: rgba(15, 10, 25, 0.65);
            --border-glow: rgba(168, 85, 247, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 80px 20px;
        }

        /* Ambient Matrix Canvas Background */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* Ultimate Neon Header */
        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff 20%, var(--primary) 50%, var(--neon-cyan) 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
            100% { filter: drop-shadow(0 0 25px rgba(6, 182, 212, 0.7)); }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Advanced Grid Matrix */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Next-Gen Cybernetic Game Cards */
        .game-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 35px 24px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Interactive Ambient Corner Highlights */
        .game-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(to bottom right, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.4s;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(22, 14, 38, 0.85);
            box-shadow: 
                0 20px 40px rgba(168, 85, 247, 0.2),
                0 0 30px rgba(6, 182, 212, 0.15);
        }

        .game-card:hover::after {
            background: linear-gradient(to bottom right, var(--neon-cyan), var(--primary));
        }

        /* Game Icon Structural Mechanics */
        .game-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffffff;
            position: relative;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:hover .game-icon {
            transform: scale(1.12) rotate(4deg);
        }

        /* Hyper Gradients */
        .slope-icon { background: linear-gradient(135deg, #a855f7, #6366f1); box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .paper-icon { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 0 20px rgba(255, 65, 108, 0.4); }
        .flappy-icon { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .cr-icon { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .stack-icon { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .stickman-icon { background: linear-gradient(135deg, #ec4899, #be185d); box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }
        .dino-icon { background: linear-gradient(135deg, #64748b, #475569); box-shadow: 0 0 20px rgba(100, 116, 139, 0.4); }
        .jetpack-icon { background: linear-gradient(135deg, #f97316, #ea580c); box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
        .gd-icon { background: linear-gradient(135deg, #06b6d4, #0891b2); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .cat-icon { background: linear-gradient(135deg, #ec4899, #f43f5e); box-shadow: 0 0 20px rgba(244, 63, 94, 0.4); }

        .game-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #e2e8f0;
            transition: color 0.3s;
        }

        .game-card:hover .game-title {
            color: #ffffff;
        }

        /* Borderless Cinematic Immersive Overlay */
        .game-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(4, 2, 8, 0.96);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(20px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .game-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* Sleek Gaming Display Window */
        .game-window {
            background: #0f0b18;
            padding: 5px;
            border-radius: 24px;
            width: 92%;
            max-width: 1100px;
            position: relative;
            box-shadow: 0 0 60px rgba(6, 182, 212, 0.3), 0 0 100px rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.3);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-overlay.active .game-window {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: -55px;
            right: 0;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 3rem;
            cursor: pointer;
            line-height: 1;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #f43f5e;
            transform: scale(1.15) rotate(90deg);
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 20px;
            background-color: #000;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <header>
        <h1>MORVAN ARCADE</h1>
        <p class="subtitle">Nexus Engine Active // Select Card To Initialize</p>
    </header>

    <div class="game-grid">
        
        <div class="game-card" onclick="openGame('https://sz-games.github.io/slope/')">
            <div class="game-icon slope-icon">S</div>
            <div class="game-title">Slope</div>
        </div>
        
        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games/paperio2/index.html')">
            <div class="game-icon paper-icon">P</div>
            <div class="game-title">Paper.io 2</div>
        </div>

        <div class="game-card" onclick="openGame('https://mr-funkinguy.github.io/gfile/flappy/index.html')">
            <div class="game-icon flappy-icon">F</div>
            <div class="game-title">Flappy Bird</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/cr/')">
            <div class="game-icon cr-icon">C</div>
            <div class="game-title">Crossy Roads</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/games/stack')">
            <div class="game-icon stack-icon">St</div>
            <div class="game-title">Stack</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games5/stickman-hook')">
            <div class="game-icon stickman-icon">SH</div>
            <div class="game-title">Stickman Hook</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/games/dino')">
            <div class="game-icon dino-icon">D</div>
            <div class="game-title">Chrome Dino</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games5/jetpack-joyride/')">
            <div class="game-icon jetpack-icon">JJ</div>
            <div class="game-title">Jetpack Joyride</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games11/geometry-dash-lite')">
            <div class="game-icon gd-icon">GD</div>
            <div class="game-title">Geometry Dash</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games11/cat%20tennis')">
            <div class="game-icon cat-icon">CT</div>
            <div class="game-title">Cat Tennis</div>
        </div>
        
    </div>

    <div id="gameOverlay" class="game-overlay">
        <div class="game-window">
            <button class="close-btn" onclick="closeGame()">&times;</button>
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Matrix Background Particles Logic
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 45;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = Math.random() > 0.5 ? 'rgba(168, 85, 247, 0.25)' : 'rgba(6, 182, 212, 0.25)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();

        // Overlay Navigation Logic
        function openGame(gameUrl) {
            const overlay = document.getElementById('gameOverlay');
            const iframe = document.getElementById('gameFrame');
            
            iframe.src = gameUrl; 
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeGame() {
            const overlay = document.getElementById('gameOverlay');
            const iframe = document.getElementById('gameFrame');
            
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                iframe.src = '';
            }, 400);
        }
    </script>

</body>
</html>
