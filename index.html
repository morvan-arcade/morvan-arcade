<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORVAN ARCADE</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #6366f1;
            --neon-cyan: #06b6d4;
            --bg-base: #06020b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 80px 20px;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff 20%, var(--primary) 50%, var(--neon-cyan) 80%);
            background-size: 150% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
            100% { filter: drop-shadow(0 0 25px rgba(6, 182, 212, 0.7)); }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
            opacity: 0;
        }

        .search-container {
            max-width: 320px;
            margin: 0 auto 40px auto;
            position: relative;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 10px 20px;
            background: rgba(15, 11, 24, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 50px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .search-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4), inset 0 0 10px rgba(6, 182, 212, 0.1);
            background: rgba(15, 11, 24, 0.85);
        }

        .search-input::placeholder {
            color: #4b5563;
            font-weight: 500;
        }

        .no-results {
            display: none;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 2px;
            margin: 40px auto;
            text-transform: uppercase;
            filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.4));
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            0% { color: #94a3b8; }
            100% { color: #f43f5e; }
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .game-card {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 200px;
        }

        .game-icon {
            width: 120px;
            height: 120px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
            overflow: hidden;
            z-index: 2;
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 26px;
            pointer-events: none;
        }

        .game-card:hover .game-icon {
            transform: scale(1.5) translateY(-5px);
        }

        .slope-icon { filter: drop-shadow(0 10px 15px rgba(168, 85, 247, 0.5)); }
        .paper-icon { filter: drop-shadow(0 10px 15px rgba(255, 65, 108, 0.5)); }
        .flappy-icon { filter: drop-shadow(0 10px 15px rgba(245, 158, 11, 0.5)); }
        .cr-icon { filter: drop-shadow(0 10px 15px rgba(59, 130, 246, 0.5)); }
        .stack-icon { filter: drop-shadow(0 10px 15px rgba(16, 185, 129, 0.5)); }
        .stickman-icon { filter: drop-shadow(0 10px 15px rgba(236, 72, 153, 0.5)); }
        .dino-icon { filter: drop-shadow(0 10px 15px rgba(100, 116, 139, 0.5)); }
        .jetpack-icon { filter: drop-shadow(0 10px 15px rgba(249, 115, 22, 0.5)); }
        .gd-icon { filter: drop-shadow(0 10px 15px rgba(6, 182, 212, 0.5)); }
        .cat-icon { filter: drop-shadow(0 10px 15px rgba(244, 63, 94, 0.5)); }
        .ab-icon { filter: drop-shadow(0 10px 15px rgba(244, 63, 94, 0.5)); }
        .fnaf-icon { filter: drop-shadow(0 10px 15px #41210780); }
        .fnaf2-icon { filter: drop-shadow(0 10px 15px #22140380); }
        .uno-icon { filter: drop-shadow(0 10px 15px hsla(0, 100%, 50%, 0.502)); }

        .game-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: absolute;
            bottom: 5px;
            text-align: center;
            width: 100%;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            z-index: 1;
        }

        .game-card:hover .game-title {
            opacity: 1;
            transform: translateY(0);
        }

        .game-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(4, 2, 8, 0.96);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(20px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .game-overlay.active {
            display: flex;
            opacity: 1;
        }

        .game-window {
            background: #0f0b18;
            padding: 5px;
            border-radius: 24px;
            width: 92%;
            max-width: 1100px;
            position: relative;
            box-shadow: 0 0 60px rgba(6, 182, 212, 0.3), 0 0 100px rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.3);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-overlay.active .game-window {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: -55px;
            right: 0;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 3rem;
            cursor: pointer;
            line-height: 1;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #f43f5e;
            transform: scale(1.15) rotate(90deg);
        }

        iframe, #flashContainer {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 20px;
            background-color: #000;
            display: block;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <header>
        <h1>MORVAN ARCADE</h1>
        <p class="subtitle">       .      </p>
        <p class="subtitle">          .   </p>
        <p class="subtitle">          .   </p>
        <p class="subtitle">          .   </p>
    </header>

    <div class="search-container">
        <input type="text" id="gameSearchBar" class="search-input" placeholder="SEARCH GAMES..." oninput="filterGames()">
    </div>

    <div id="noResultsMessage" class="no-results">No games found matching that search</div>

    <div class="game-grid">
        
        <div class="game-card" onclick="openGame('https://sz-games.github.io/slope/')">
            <div class="game-icon slope-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/slope.webp" alt="Slope"></div>
            <div class="game-title">Slope</div>
        </div>
        
        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games/paperio2/index.html')">
            <div class="game-icon paper-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/paperio.webp" alt="Paper.io 2"></div>
            <div class="game-title">Paper.io 2</div>
        </div>

        <div class="game-card" onclick="openGame('https://mr-funkinguy.github.io/gfile/flappy/index.html')">
            <div class="game-icon flappy-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/FlappyBird.png" alt="Flappy Bird"></div>
            <div class="game-title">Flappy Bird</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/cr/')">
            <div class="game-icon cr-icon"><img src="https://github.com/sz-games/storage3/blob/main/cr.jpeg?raw=true" alt="Crossy Road"></div>
            <div class="game-title">Crossy Road</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/games/stack')">
            <div class="game-icon stack-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/Stack.webp" alt="Stack"></div>
            <div class="game-title">Stack</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games5/stickman-hook')">
            <div class="game-icon stickman-hook"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/890P.jpeg" alt="Stickman Hook"></div>
            <div class="game-title">Stickman Hook</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/games/dino')">
            <div class="game-icon dino-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/dino.webp" alt="Chrome Dino"></div>
            <div class="game-title">Chrome Dino</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games5/jetpack-joyride/')">
            <div class="game-icon jetpack-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/jetpackjoyride.webp" alt="Jetpack Joyride"></div>
            <div class="game-title">Jetpack Joyride</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games11/geometry-dash-lite')">
            <div class="game-icon gd-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/geo.jpeg" alt="Geometry Dash"></div>
            <div class="game-title">Geometry Dash</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games11/cat%20tennis')">
            <div class="game-icon cat-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/cattennis.png" alt="Cat Tennis"></div>
            <div class="game-title">Cat Tennis</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games5/AngryBirds/')">
            <div class="game-icon ab-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/0991L.webp" alt="Angry Birds"></div>
            <div class="game-title">Angry Birds</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games9/fnaf-1/index.html')">
            <div class="game-icon fnaf-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/fnaf1.jpeg" alt="Fnaf 1"></div>
            <div class="game-title">Five Nights at Freddy's</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games4//fnaf-2/index.html')">
            <div class="game-icon fnaf2-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/fnaf2.webp" alt="Fnaf 2"></div>
            <div class="game-title">Five Nights at Freddy's 2</div>
        </div>

        <div class="game-card" onclick="openFlashGame('https://sz-games.github.io/Games11/the_binding_of_isaac.swf')">
            <div class="game-icon fnaf-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/isaacb.png" alt="The Binding Of Isaac"></div>
            <div class="game-title">The Binding Of Isaac</div>
        </div>

        <div class="game-card" onclick="openFlashGame('https://sz-games.github.io/Games11/pvz.swf')">
            <div class="game-icon stack-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/pvz.png" alt="PVZ"></div>
            <div class="game-title">PVZ</div>
        </div>

        <div class="game-card" onclick="openFlashGame('https://sz-games.github.io/Games11/ducklife1/game.swf')">
            <div class="game-icon stack-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/ducklife.avif" alt="Duck Life"></div>
            <div class="game-title">Duck Life</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games6/snakeio')">
            <div class="game-icon ab-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/SNAKEIO.png" alt="Snake"></div>
            <div class="game-title">Snake io</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games9/superhot/index.html')">
            <div class="game-icon ab-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/superhot.jpeg" alt="Super Hot"></div>
            <div class="game-title">Super Hot</div>
        </div>

        <div class="game-card" onclick="openGame('https://sz-games.github.io/Games9/uno/index.html')">
            <div class="game-icon uno-icon"><img src="https://raw.githubusercontent.com/sz-games/sz-games.github.io/main/cover/uno.png" alt="UNO"></div>
            <div class="game-title">Uno</div>
        </div>

    </div>

    <div id="gameOverlay" class="game-overlay">
        <div class="game-window">
            <button class="close-btn" onclick="closeGame()">&times;</button>
            <iframe id="gameFrame" src="" allowfullscreen style="display: none;"></iframe>
            <div id="flashContainer" style="display: none;"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 45;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = Math.random() > 0.5 ? 'rgba(168, 85, 247, 0.25)' : 'rgba(6, 182, 212, 0.25)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();

        function filterGames() {
            const searchInput = document.getElementById('gameSearchBar').value.toLowerCase();
            const gameCards = document.querySelectorAll('.game-card');
            const noResultsMsg = document.getElementById('noResultsMessage');
            let visibleCount = 0;

            gameCards.forEach(card => {
                const titleText = card.querySelector('.game-title').textContent.toLowerCase();
                if (titleText.includes(searchInput)) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCount === 0) {
                noResultsMsg.style.display = 'block';
            } else {
                noResultsMsg.style.display = 'none';
            }
        }

        function openGame(gameUrl) {
            const overlay = document.getElementById('gameOverlay');
            const iframe = document.getElementById('gameFrame');
            const flashContainer = document.getElementById('flashContainer');
            
            flashContainer.style.display = 'none';
            iframe.style.display = 'block';
            
            iframe.src = gameUrl; 
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function openFlashGame(swfUrl) {
            const overlay = document.getElementById('gameOverlay');
            const iframe = document.getElementById('gameFrame');
            const flashContainer = document.getElementById('flashContainer');
            
            iframe.style.display = 'none';
            flashContainer.style.display = 'block';
            flashContainer.innerHTML = '';

            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);

            if (window.RufflePlayer) {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                player.style.width = "100%";
                player.style.height = "100%";
                flashContainer.appendChild(player);
                player.load({
                    url: swfUrl,
                    allowScriptAccess: true
                });
            } else {
                flashContainer.innerHTML = "<p style='color:red; text-align:center; padding-top:20px;'>Ruffle failed to load.</p>";
            }
        }

        function closeGame() {
            const overlay = document.getElementById('gameOverlay');
            const iframe = document.getElementById('gameFrame');
            const flashContainer = document.getElementById('flashContainer');
            
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                iframe.src = '';
                flashContainer.innerHTML = '';
            }, 400);
        }
    </script>

</body>
</html>
